include:
  - template: Auto-DevOps.gitlab-ci.yml

variables:
  DOCKER_BUILDKIT: '1'


stages:
  - build
  - docker
  - test
  - deploy  # dummy stage to follow the template guidelines
  - review
  - dast
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - performance
  - cleanup


node_build:
  image: node
  script:
    - yarn install
    - yarn build
  cache:
    key: node-modules
    paths:
      - node_modules
  stage: build
  artifacts:
    name: 'React build'
    paths:
      - build

build:
  stage: docker
  needs:
    - node_build
  dependencies:
    - node_build

test:
  allow_failure: true

sentry_release:
  stage: .post
  image: getsentry/sentry-cli
  script:
    - VERSION=$(sentry-cli releases propose-version)
    - sentry-cli releases new -p international-media-referencing-front $CI_COMMIT_SHORT_SHA
    - sentry-cli releases set-commits --auto $CI_COMMIT_SHORT_SHA
