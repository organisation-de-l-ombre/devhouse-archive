include:
  - template: Auto-DevOps.gitlab-ci.yml
  - project: 'developers-house/dev/gitlab-ci-collection'
    ref: master
    file: 'kaniko.gitlab-ci.yml'


variables:
  DOCKER_BUILDKIT: '1'

stages:
  - build
  - docker
  - test
  - deploy # dummy stage to follow the template guidelines
  - review
  - dast
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - performance
  - cleanup

test:
  image: node:14
  before_script:
    - echo "@developers-house:registry=https://gitlab.com/api/v4/packages/npm/" >> .npmrc
    - echo "//gitlab.com/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "//gitlab.com/api/v4/projects/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm config set -- '//gitlab.com/api/v4/packages/npm/:_authToken' "${NPM_TOKEN}"
  script:
    - yarn install
    - yarn test
node_build:
  image: node:14

  script:
    - echo "@developers-house:registry=https://gitlab.com/api/v4/packages/npm/" >> .npmrc
    - echo "//gitlab.com/api/v4/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - echo "//gitlab.com/api/v4/projects/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm config set -- '//gitlab.com/api/v4/packages/npm/:_authToken' "${NPM_TOKEN}"
    - yarn install
    - yarn build
  cache:
    key: node-modules
    paths:
      - node_modules
  stage: build
  artifacts:
    name: "React build"
    paths:
      - build

build:
  stage: docker
  needs:
    - node_build
  dependencies:
    - node_build
  
sentry_release:
  stage: .post
  image: getsentry/sentry-cli
  script:
    - VERSION=$(sentry-cli releases propose-version)
    - sentry-cli releases new -p website $VERSION
    - sentry-cli releases set-commits --auto $VERSION
