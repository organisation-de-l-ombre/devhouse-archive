include:
  - template: Auto-DevOps.gitlab-ci.yml
  - project: 'developers-house/dev/gitlab-ci-collection'
    ref: master
    file: 'kaniko.gitlab-ci.yml'
  - project: 'developers-house/dev/gitlab-ci-collection'
    ref: master
    file: 'helm.gitlab-ci.yml'

variables:
  TEST_DISABLED: 'true'

stages:
  - build
  - docker
  - test
  - deploy  # dummy stage to follow the template guidelines
  - review
  - dast
  - staging
  - canary
  - production
  - incremental rollout 10%
  - incremental rollout 25%
  - incremental rollout 50%
  - incremental rollout 100%
  - performance
  - cleanup


rust_build:
  image: rust
  script:
    - apt-get update
    - apt-get install clang -y
    - cargo update
    - cargo build --release
  cache:
    key: cargo
    paths:
      - target
  stage: build
  artifacts:
    name: 'target'
    paths:
      - target

build:
  stage: docker
  needs:
    - rust_build
  dependencies:
    - rust_build
