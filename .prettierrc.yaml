# Prettier configuration for Node.js projects that use TypeScript
# API options can be found at https://prettier.io/docs/en/options.html

printWidth: 80
tabWidth: 2
useTabs: false
semi: true
singleQuote: false
quoteProps: as-needed
trailingComma: none
bracketSpacing: true
arrowParens: always
requirePragma: false
insertPragma: false
proseWrap: preserve
endOfLine: lf
embeddedLanguageFormatting: "off"
