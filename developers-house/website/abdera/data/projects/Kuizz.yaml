name: Kuizz
normalizedName: kuizz
shortDescription: A simple and easy competitive quizz application.
longDescription: |
  Kuizz is a simple and easy quizz application. Kuizz can organize
  competitive games, tournaments and groups and allow you to play
  in real-time with your friends around the world. Kuizz will be 
  available on all platforms, such as Android, IOS and in your
  web browser. Kuizz will be cross-platform and free for everyone.
