shortDescription: A complete and online database referencing a great deal of movies and series.
longDescription: |
  International Media Referencing is an online web database which references a great deal of multimedia
  content such as movies or series. The goal is to purpose an alternative to other online databases
  (IMDB, TMDB) while adding features like Wikipedia or Fandom (detailled information, casting, original
  soundtrack, etc...). Everyone who possesses a verified account on the platform can add or edit content
  to contribute.
