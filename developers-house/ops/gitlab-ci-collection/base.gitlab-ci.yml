# -----------------
# This file is the deployment manifests used by Developer's House to deploy every project
# of the infrastructure, please, test your changes on another repo before submitting your changes.
# -----------------

stages:
  - build
  - test
  - review
  - staging
  - production
  - cleanup


# Build stage, this one uses a deamonless build via kaniko.
build:
  stage: build
  image:
    # We need to use the debug version in order to have a shell in the container.
    name: gcr.io/kaniko-project/executor:debug
    entrypoint:
    - ''
  script:  
  - |
    if [[ -z "$CI_COMMIT_TAG" ]]; then
        export CI_APPLICATION_REPOSITORY=${CI_APPLICATION_REPOSITORY:-$CI_REGISTRY_IMAGE/$CI_COMMIT_REF_SLUG}
        export CI_APPLICATION_TAG=${CI_APPLICATION_TAG:-$CI_COMMIT_SHA}
    else
        export CI_APPLICATION_REPOSITORY=${CI_APPLICATION_REPOSITORY:-$CI_REGISTRY_IMAGE}
        export CI_APPLICATION_TAG=${CI_APPLICATION_TAG:-$CI_COMMIT_TAG}
    fi
    mkdir -p /kaniko/.docker
    echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\", \"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
  - /kaniko/executor --context . --dockerfile ./Dockerfile --destination "$CI_APPLICATION_REPOSITORY:$CI_APPLICATION_TAG" $AUTO_DEVOPS_BUILD_IMAGE_EXTRA_ARGS --cache=true
  rules:
  - if: "$CI_COMMIT_TAG || $CI_COMMIT_BRANCH"
# Build stage, to be filled by project.
test:
  stage: test
  image: alpine
  needs: []
  script:
  - echo "No tests defined, please implement it in .gitlab-ci.yml"
  rules:
  - if: "$CI_COMMIT_TAG || $CI_COMMIT_BRANCH"

# Base stage template for the deployment jobs.
.deploy:
  # May be replaced later with a better developer's house version of the deployment utility image.
  image: registry.gitlab.com/gitlab-org/cluster-integration/auto-deploy-image/v2-3-1:latest
  variables:
    AUTO_DEVOPS_FORCE_DEPLOY_V2: 1
    HELM_UPGRADE_VALUES_FILE: deploy.yml

# Used to deploy developement environments, it creates all the ressources on the cluster.
review:
  stage: review
  # Extends the base deploy template stage.
  extends: .deploy

  script:

    # Checks that a kubernetes domain variable is specified
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L14
    - auto-deploy check_kube_domain 
    # Download the chart from the Developer's House repository
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L27
    - auto-deploy download_chart
    # Ensure that the kubernetes namespace is created inside the cluster
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L93
    # Equivalent to `kubectl get namespace "$KUBE_NAMESPACE" || kubectl create namespace "$KUBE_NAMESPACE"`
    - auto-deploy ensure_namespace
    # Creates the docker pull secret for the images to be pulled with.
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L112
    - auto-deploy create_secret
    # Remove this environment variable to bypass this check https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L366
    - unset ROLLOUT_STATUS_DISABLED
    # Deploys the helm chart to the cluster using helm
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L182
    - auto-deploy deploy
    # Writes the environment url to a file
    - echo $CI_ENVIRONMENT_URL > environment_url.txt

  environment:
    name: review/$CI_COMMIT_REF_NAME
    # Environment template
    url: http://$CI_ENVIRONMENT_SLUG-$CI_PROJECT_NAME.$KUBE_INGRESS_BASE_DOMAIN
    on_stop: stop_review
  
  artifacts:
    paths:
    - environment_url.txt # Return the environment name
    when: always

  rules:
  - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH" # Disable on the default branch.
    when: never
  - if: "$CI_COMMIT_TAG || $CI_COMMIT_BRANCH"

# Removes a review from the cluster at the end of a review
stop_review:
  stage: cleanup
  allow_failure: true

  variables:
    GIT_STRATEGY: none # Disable pulling of the repo
  extends: ".deploy"

  script:
    # Call the deletion script to delete the review.
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L401
    - auto-deploy delete

  environment:
    name: review/$CI_COMMIT_REF_NAME # This patches the name of the review environment.
    action: stop

  rules:
  - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    when: never
  - if: "$CI_COMMIT_TAG || $CI_COMMIT_BRANCH"
    when: manual

# Deploys a staging environment, it's the same as a production environment but with early updates.
staging:
  extends: ".deploy"
  stage: staging

  script:

    # Checks that a kubernetes domain variable is specified
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L14
    - auto-deploy check_kube_domain 
    # Download the chart from the Developer's House repository
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L27
    - auto-deploy download_chart
    # Ensure that the kubernetes namespace is created inside the cluster
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L93
    # Equivalent to `kubectl get namespace "$KUBE_NAMESPACE" || kubectl create namespace "$KUBE_NAMESPACE"`
    - auto-deploy ensure_namespace
    # Creates the docker pull secret for the images to be pulled with.
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L112
    - auto-deploy create_secret
    # Deploys the helm chart to the cluster using helm
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L182
    - auto-deploy deploy
    # Writes the environment url to a file
    - echo $CI_ENVIRONMENT_URL > environment_url.txt

  environment:
    name: staging
    url: http://$CI_PROJECT_NAME-staging.$KUBE_INGRESS_BASE_DOMAIN  # 
  
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"

production:
  extends: ".deploy"
  stage: production
  script:

    # Checks that a kubernetes domain variable is specified
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L14
    - auto-deploy check_kube_domain 
    # Download the chart from the Developer's House repository
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L27
    - auto-deploy download_chart
    # Ensure that the kubernetes namespace is created inside the cluster
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L93
    # Equivalent to `kubectl get namespace "$KUBE_NAMESPACE" || kubectl create namespace "$KUBE_NAMESPACE"`
    - auto-deploy ensure_namespace
    # Creates the docker pull secret for the images to be pulled with.
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L112
    - auto-deploy create_secret
    # Deploys the helm chart to the cluster using helm
    # See source https://gitlab.com/developers-house/auto-deploy-image/-/blob/master/src/bin/auto-deploy#L182
    - auto-deploy deploy
    # Writes the environment url to a file
    - echo $CI_ENVIRONMENT_URL > environment_url.txt

  environment:
    name: production
    url: http://$CI_PROJECT_NAME.$KUBE_INGRESS_BASE_DOMAIN

  artifacts:
    paths:
    - environment_url.txt
    when: always
  
  rules:
    - if: "$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    - if: "$CI_COMMIT_TAG || $CI_COMMIT_BRANCH"
    - when: manual
