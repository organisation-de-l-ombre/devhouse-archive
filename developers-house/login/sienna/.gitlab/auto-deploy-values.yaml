service:
  externalPort: 3000
  internalPort: 3000

ingress:
  path: /dialog

livenessProbe:
  path: "/dialog/api/healz"
  initialDelaySeconds: 15
  timeoutSeconds: 15
  scheme: "HTTP"
  probeType: "httpGet"
readinessProbe:
  path: "/dialog/api/healz"
  initialDelaySeconds: 5
  timeoutSeconds: 3
  scheme: "HTTP"
  probeType: "httpGet"
