version: "3"

services:
    scarlet:
      build:
        context: .
        dockerfile: .devcontainer/Dockerfile
      volumes:
        - .:/workspace:cached
      cap_add:
        - SYS_PTRACE
      security_opt:
        - seccomp:unconfined
      command: /bin/sh -c "while sleep 1000; do :; done"
      depends_on:
        - postgres
      links:
        - postgres