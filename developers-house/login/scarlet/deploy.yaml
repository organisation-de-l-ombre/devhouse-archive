ingress:
  enabled: false

# How the health of the container should be checked.
# https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
health:
  # Check if the container if alive.
  # if not, the container will be restarted.
  livenessProbe:
    path: "/_healz"
    initialDelaySeconds: 15
    timeoutSeconds: 15
    scheme: "HTTP"
    probeType: "httpGet"
    command: []
  # Check if the container is ready to be available.
  # The container will not be available if this check
  # is not passing.
  readinessProbe:
    path: "/_healz"
    initialDelaySeconds: 5
    timeoutSeconds: 3
    scheme: "HTTP"
    probeType: "httpGet"
    command: []

service:
  externalPort: 80
  # The port of your application goes here.
  internalPort: 8000

# The autoscaling section defined how
# the service should be scaled depending
# on metrics such as memory percentage
# or cpu percentage of the containers.
# you must fill the ressources section for
# this to work.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 280
  targetMemoryUtilizationPercentage: 280

# The limits of the container, if
# the container starts to use more
# memory than expected, if will be
# killed with an error "OOMKilled".
resources:
  limits:
    cpu: 200m
    memory: 500Mi
  requests:
    cpu: 25m
    memory: 128Mi

networkPolicy:
  enabled: false
  spec:
    podSelector:
      matchLabels: {}
    ingress:
    - from:
      - podSelector:
          matchLabels:
            # Candace need the access to Scarlet.
            app.gitlab.com/app: developers-house-dev-login-group-candace


