apiVersion: apps/v1
kind: Deployment
metadata:
  name: gdpr-collector
  labels:
    app: gdpr-collector
spec:
  selector:
    matchLabels:
      app: gdpr-collector
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: gdpr-collector
    spec:
      containers:
      - name: gdpr-collector
        image: image
        resources:
          requests:
            cpu: 50m
            memory: 25Mi
          limits:
            cpu: 100m
            memory: 100Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8090
          initialDelaySeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8090
          initialDelaySeconds: 5
          timeoutSeconds: 2
          successThreshold: 1
          failureThreshold: 3
          periodSeconds: 10
        ports:
        - containerPort:  8090
          name: http
      restartPolicy: Always
      imagePullSecrets:
        - name: ${IMAGE_PULL_SECRET}