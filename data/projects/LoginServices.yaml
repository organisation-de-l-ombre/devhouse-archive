shortDescription: Login platform handles all the users sessions, and RGPD compliance.
longDescription: |
  The Login Services handles all the user accounts, manage all the user's data, and
  ensure the RGPD compliance across all the Developer's House services. It also handles
  the login system management and moderation requirements. This is a central piece of 
  Developer's House and is required for the functionement of various services.
